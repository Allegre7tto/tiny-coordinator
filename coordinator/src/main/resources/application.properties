# ─── Raft engine (JNI, in-process) ────────────────────────────────────────────
# Override via env: RAFT_ID, RAFT_DATA_DIR, RAFT_PEERS, RAFT_PORT
raft.id=${RAFT_ID:0}
raft.data.dir=${RAFT_DATA_DIR:/tmp/raft-data}
raft.peers=${RAFT_PEERS:127.0.0.1:7000,127.0.0.1:7001,127.0.0.1:7002}
raft.port=${RAFT_PORT:7000}

# ─── This service gRPC server port ────────────────────────────────────────────
# Serves coordinator.proto to external clients
quarkus.grpc.server.port=${ENGINE_GRPC_PORT:9000}
quarkus.grpc.server.plain-text=true

# ─── HTTP management port (health + metrics) ──────────────────────────────────
quarkus.management.enabled=true
quarkus.management.port=${ENGINE_MGMT_PORT:9001}

# ─── Health ───────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health

# ─── Metrics ──────────────────────────────────────────────────────────────────
quarkus.micrometer.export.prometheus.path=/q/metrics

# ─── OpenTelemetry ────────────────────────────────────────────────────────────
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.service.name=${ENGINE_SERVICE_NAME:engine-coordinator}

# ─── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.console.json=${ENGINE_JSON_LOG:true}
quarkus.log.level=${ENGINE_LOG_LEVEL:INFO}
quarkus.log.category."engine".level=DEBUG
