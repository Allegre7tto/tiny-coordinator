raft.node-id=${RAFT_NODE_ID:1}
raft.data-dir=${RAFT_DATA_DIR:data}
raft.members=${RAFT_MEMBERS:1=127.0.0.1:9000}
raft.election-timeout-ms=${RAFT_ELECTION_TIMEOUT_MS:3000}
raft.heartbeat-interval-ms=${RAFT_HEARTBEAT_INTERVAL_MS:1000}
raft.tick-interval=${RAFT_TICK_INTERVAL:1s}
raft.snapshot-interval=${RAFT_SNAPSHOT_INTERVAL:30s}
lease.scan-interval=${LEASE_SCAN_INTERVAL:1s}

quarkus.index-dependency.proto.group-id=dev.talent
quarkus.index-dependency.proto.artifact-id=proto

quarkus.grpc.server.use-separate-server=false
quarkus.http.port=${ENGINE_GRPC_PORT:9000}
quarkus.http.http2=true

quarkus.management.enabled=true
quarkus.management.port=${ENGINE_MGMT_PORT:9001}
quarkus.smallrye-health.root-path=/q/health

quarkus.log.level=${ENGINE_LOG_LEVEL:INFO}

%test.raft.data-dir=target/test-raft-data
%test.raft.members=1=127.0.0.1:19090
%test.quarkus.http.test-port=0
%test.quarkus.management.test-port=0
