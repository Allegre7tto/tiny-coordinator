services:
  # ── C++ Raft nodes (3-node cluster) ──────────────────────────────────────────
  engine-cpp-0:
    build:
      context: .
      dockerfile: Dockerfile.cpp
    command: ["0", "/data", "engine-cpp-0:7000", "engine-cpp-1:7000", "engine-cpp-2:7000"]
    volumes:
      - cpp-data-0:/data
    networks:
      - engine-net

  engine-cpp-1:
    build:
      context: .
      dockerfile: Dockerfile.cpp
    command: ["1", "/data", "engine-cpp-0:7000", "engine-cpp-1:7000", "engine-cpp-2:7000"]
    volumes:
      - cpp-data-1:/data
    networks:
      - engine-net

  engine-cpp-2:
    build:
      context: .
      dockerfile: Dockerfile.cpp
    command: ["2", "/data", "engine-cpp-0:7000", "engine-cpp-1:7000", "engine-cpp-2:7000"]
    volumes:
      - cpp-data-2:/data
    networks:
      - engine-net

  # ── Java Coordinator (connects to node 0, follows leader automatically) ──────
  coordinator:
    build:
      context: .
      dockerfile: Dockerfile.java
    environment:
      ENGINE_CPP_HOST: engine-cpp-0
      ENGINE_CPP_PORT: "7000"
      ENGINE_GRPC_PORT: "9000"
      ENGINE_MGMT_PORT: "9001"
      ENGINE_JSON_LOG: "true"
    ports:
      - "9000:9000"   # gRPC API (coordinator.proto)
      - "9001:9001"   # Health + Metrics (/q/health, /q/metrics)
    depends_on:
      - engine-cpp-0
      - engine-cpp-1
      - engine-cpp-2
    networks:
      - engine-net

volumes:
  cpp-data-0:
  cpp-data-1:
  cpp-data-2:

networks:
  engine-net:
