services:
  coordinator-0:
    build:
      context: .
      dockerfile: Dockerfile.java
    environment:
      RAFT_ID: "0"
      RAFT_DATA_DIR: /data
      RAFT_PEERS: coordinator-0:7000,coordinator-1:7000,coordinator-2:7000
      RAFT_PORT: "7000"
      ENGINE_GRPC_PORT: "9000"
      ENGINE_MGMT_PORT: "9001"
      ENGINE_JSON_LOG: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - data-0:/data
    networks:
      - engine-net

  coordinator-1:
    build:
      context: .
      dockerfile: Dockerfile.java
    environment:
      RAFT_ID: "1"
      RAFT_DATA_DIR: /data
      RAFT_PEERS: coordinator-0:7000,coordinator-1:7000,coordinator-2:7000
      RAFT_PORT: "7000"
      ENGINE_GRPC_PORT: "9000"
      ENGINE_MGMT_PORT: "9001"
      ENGINE_JSON_LOG: "true"
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - data-1:/data
    networks:
      - engine-net

  coordinator-2:
    build:
      context: .
      dockerfile: Dockerfile.java
    environment:
      RAFT_ID: "2"
      RAFT_DATA_DIR: /data
      RAFT_PEERS: coordinator-0:7000,coordinator-1:7000,coordinator-2:7000
      RAFT_PORT: "7000"
      ENGINE_GRPC_PORT: "9000"
      ENGINE_MGMT_PORT: "9001"
      ENGINE_JSON_LOG: "true"
    ports:
      - "9004:9000"
      - "9005:9001"
    volumes:
      - data-2:/data
    networks:
      - engine-net

volumes:
  data-0:
  data-1:
  data-2:

networks:
  engine-net:
