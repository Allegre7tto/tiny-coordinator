services:
  coordinator-1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RAFT_NODE_ID: "1"
      RAFT_DATA_DIR: /data
      RAFT_MEMBERS: 1=coordinator-1:9000,2=coordinator-2:9000,3=coordinator-3:9000
      ENGINE_GRPC_PORT: "9000"
      ENGINE_MGMT_PORT: "9001"
      ENGINE_JSON_LOG: "true"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - data-1:/data
    networks:
      - engine-net

  coordinator-2:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RAFT_NODE_ID: "2"
      RAFT_DATA_DIR: /data
      RAFT_MEMBERS: 1=coordinator-1:9000,2=coordinator-2:9000,3=coordinator-3:9000
      ENGINE_GRPC_PORT: "9000"
      ENGINE_MGMT_PORT: "9001"
      ENGINE_JSON_LOG: "true"
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - data-2:/data
    networks:
      - engine-net

  coordinator-3:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RAFT_NODE_ID: "3"
      RAFT_DATA_DIR: /data
      RAFT_MEMBERS: 1=coordinator-1:9000,2=coordinator-2:9000,3=coordinator-3:9000
      ENGINE_GRPC_PORT: "9000"
      ENGINE_MGMT_PORT: "9001"
      ENGINE_JSON_LOG: "true"
    ports:
      - "9004:9000"
      - "9005:9001"
    volumes:
      - data-3:/data
    networks:
      - engine-net

volumes:
  data-1:
  data-2:
  data-3:

networks:
  engine-net:
