syntax = "proto3";

package engine.coordinator.v1;

option cc_generic_services = false;

// ─── Common ──────────────────────────────────────────────────────────────────
message KeyValue {
  bytes  key            = 1;
  bytes  value          = 2;
  int64  create_revision = 3;
  int64  mod_revision   = 4;
  int64  version        = 5;
  int64  lease          = 6;
}

message ResponseHeader {
  uint64 cluster_id = 1;
  uint64 member_id  = 2;
  int64  revision   = 3;  // store revision at the time of the response
  uint64 raft_term  = 4;
}

// ─── KV Operations ───────────────────────────────────────────────────────────
message PutRequest {
  bytes key    = 1;
  bytes value  = 2;
  int64 lease  = 3;
  // client dedup
  uint64 client_id  = 4;
  uint64 request_id = 5;
}

message PutResponse {
  ResponseHeader header   = 1;
  KeyValue       prev_kv  = 2;  // populated if requested
}

message GetRequest {
  bytes  key       = 1;
  bytes  range_end = 2;  // empty = point lookup; "\0" = all keys >= key
  int64  limit     = 3;
  int64  revision  = 4;  // 0 = latest
  bool   keys_only = 5;
}

message GetResponse {
  ResponseHeader   header  = 1;
  repeated KeyValue kvs    = 2;
  bool             more    = 3;
  int64            count   = 4;
}

message DeleteRequest {
  bytes  key       = 1;
  bytes  range_end = 2;
  bool   prev_kv   = 3;
  uint64 client_id  = 4;
  uint64 request_id = 5;
}

message DeleteResponse {
  ResponseHeader    header   = 1;
  int64             deleted  = 2;
  repeated KeyValue prev_kvs = 3;
}

// ─── Watch ───────────────────────────────────────────────────────────────────
enum EventType {
  PUT    = 0;
  DELETE = 1;
}

message Event {
  EventType type    = 1;
  KeyValue  kv      = 2;
  KeyValue  prev_kv = 3;
}

message WatchCreateRequest {
  bytes key              = 1;
  bytes range_end        = 2;
  int64 start_revision   = 3;
  bool  prev_kv          = 4;
}

message WatchCancelRequest {
  int64 watch_id = 1;
}

message WatchRequest {
  oneof request_union {
    WatchCreateRequest create_request = 1;
    WatchCancelRequest cancel_request = 2;
  }
}

message WatchResponse {
  ResponseHeader   header    = 1;
  int64            watch_id  = 2;
  bool             created   = 3;
  bool             canceled  = 4;
  int64            compact_revision = 5;
  repeated Event   events    = 6;
}

// ─── Lease ───────────────────────────────────────────────────────────────────
message LeaseGrantRequest {
  int64  ttl = 1;
  int64  id  = 2;  // 0 = server generates
}

message LeaseGrantResponse {
  ResponseHeader header = 1;
  int64          id     = 2;
  int64          ttl    = 3;
  string         error  = 4;
}

message LeaseRevokeRequest {
  int64 id = 1;
}

message LeaseRevokeResponse {
  ResponseHeader header = 1;
}

message LeaseKeepAliveRequest {
  int64 id = 1;
}

message LeaseKeepAliveResponse {
  ResponseHeader header = 1;
  int64          id     = 2;
  int64          ttl    = 3;
}

// ─── Cluster ─────────────────────────────────────────────────────────────────
message Member {
  uint64          id         = 1;
  string          name       = 2;
  repeated string peer_urls  = 3;
}

message MemberListRequest  {}

message MemberListResponse {
  ResponseHeader   header  = 1;
  repeated Member  members = 2;
}

// ─── Service ─────────────────────────────────────────────────────────────────
service Coordinator {
  // KV
  rpc Put    (PutRequest)    returns (PutResponse);
  rpc Get    (GetRequest)    returns (GetResponse);
  rpc Delete (DeleteRequest) returns (DeleteResponse);

  // Watch (bidirectional streaming)
  rpc Watch (stream WatchRequest) returns (stream WatchResponse);

  // Lease
  rpc LeaseGrant     (LeaseGrantRequest)                           returns (LeaseGrantResponse);
  rpc LeaseRevoke    (LeaseRevokeRequest)                          returns (LeaseRevokeResponse);
  rpc LeaseKeepAlive (stream LeaseKeepAliveRequest)                returns (stream LeaseKeepAliveResponse);

  // Cluster
  rpc MemberList (MemberListRequest) returns (MemberListResponse);
}
