syntax = "proto3";

package engine.coordinator.v1;

option cc_generic_services = false;

// ─── Common ──────────────────────────────────────────────────────────────────
message KeyValue {
  bytes key       = 1;
  bytes value     = 2;
  int64 createrev = 3;
  int64 modrev    = 4;
  int64 version   = 5;
  int64 lease     = 6;
}

message ResponseHeader {
  uint64 clusterid = 1;
  uint64 memberid  = 2;
  int64  revision  = 3;
  uint64 raftterm  = 4;
}

// ─── KV Operations ───────────────────────────────────────────────────────────
message PutRequest {
  bytes  key      = 1;
  bytes  value    = 2;
  int64  lease    = 3;
  uint64 clientid = 4;
  uint64 reqid    = 5;
}

message PutResponse {
  ResponseHeader header  = 1;
  KeyValue       prevkv  = 2;
}

message GetRequest {
  bytes key      = 1;
  bytes rangeend = 2;
  int64 limit    = 3;
  int64 revision = 4;
  bool  keysonly = 5;
}

message GetResponse {
  ResponseHeader   header = 1;
  repeated KeyValue kvs   = 2;
  bool             more   = 3;
  int64            count  = 4;
}

message DeleteRequest {
  bytes  key      = 1;
  bytes  rangeend = 2;
  bool   prevkv   = 3;
  uint64 clientid = 4;
  uint64 reqid    = 5;
}

message DeleteResponse {
  ResponseHeader    header   = 1;
  int64             deleted  = 2;
  repeated KeyValue prevkvs  = 3;
}

// ─── Watch ───────────────────────────────────────────────────────────────────
enum EventType {
  PUT    = 0;
  DELETE = 1;
}

message Event {
  EventType type   = 1;
  KeyValue  kv     = 2;
  KeyValue  prevkv = 3;
}

message WatchCreateRequest {
  bytes key      = 1;
  bytes rangeend = 2;
  int64 startrev = 3;
  bool  prevkv   = 4;
}

message WatchCancelRequest {
  int64 watchid = 1;
}

message WatchRequest {
  oneof requnion {
    WatchCreateRequest createreq = 1;
    WatchCancelRequest cancelreq = 2;
  }
}

message WatchResponse {
  ResponseHeader   header      = 1;
  int64            watchid     = 2;
  bool             created     = 3;
  bool             canceled    = 4;
  int64            compactrev  = 5;
  repeated Event   events      = 6;
}

// ─── Lease ───────────────────────────────────────────────────────────────────
message LeaseGrantRequest {
  int64 ttl = 1;
  int64 id  = 2;
}

message LeaseGrantResponse {
  ResponseHeader header = 1;
  int64          id     = 2;
  int64          ttl    = 3;
  string         error  = 4;
}

message LeaseRevokeRequest {
  int64 id = 1;
}

message LeaseRevokeResponse {
  ResponseHeader header = 1;
}

message LeaseKeepAliveRequest {
  int64 id = 1;
}

message LeaseKeepAliveResponse {
  ResponseHeader header = 1;
  int64          id     = 2;
  int64          ttl    = 3;
}

// ─── Txn ─────────────────────────────────────────────────────────────────────
message Compare {
  enum CompareTarget {
    KEY            = 0;
    VALUE          = 1;
    CREATE_REVISION = 2;
    MOD_REVISION   = 3;
    VERSION        = 4;
  }

  enum CompareResult {
    EQUAL   = 0;
    GREATER = 1;
    LESS    = 2;
  }

  CompareTarget target = 1;
  CompareResult result = 2;
  bytes         key    = 3;
  bytes         value  = 4;
}

message RequestOp {
  oneof request {
    PutRequest    put    = 1;
    DeleteRequest delete = 2;
    GetRequest    range  = 3;
  }
}

message OperationResponse {
  oneof response {
    PutResponse    put    = 1;
    DeleteResponse delete = 2;
    GetResponse    range  = 3;
  }
  int64 revision = 4;
}

message TxnRequest {
  repeated Compare    compare = 1;
  repeated RequestOp  success = 2;
  repeated RequestOp  failure = 3;
}

message TxnResponse {
  ResponseHeader              header    = 1;
  bool                        succeeded = 2;
  repeated OperationResponse  responses = 3;
}

// ─── Compact ────────────────────────────────────────────────────────────────
message CompactRequest {
  int64 revision = 1;
}

message CompactResponse {
  ResponseHeader header    = 1;
  int64          revision  = 2;
  int64          removed   = 3;
}

// ─── Cluster ─────────────────────────────────────────────────────────────────
message Member {
  uint64          id       = 1;
  string          name     = 2;
  repeated string peerurls = 3;
}

message MemberListRequest  {}

message MemberListResponse {
  ResponseHeader   header  = 1;
  repeated Member  members = 2;
}

// ─── Internal ────────────────────────────────────────────────────────────────
message CommandEnvelope {
  uint32 optype    = 1;
  uint64 pid       = 2;
  bytes  payload   = 3;
}

message LeaseState {
  int64  id         = 1;
  int64  ttlsecs    = 2;
  int64  deadlinems = 3;
  repeated bytes keys = 4;
}

message StateMachineSnapshot {
  int64  lastappliedidx = 1;
  int64  mvccrev        = 2;
  int64  compactrev     = 3;
  repeated KeyValue kvs = 4;
  repeated LeaseState leases = 5;
}

// ─── Service ─────────────────────────────────────────────────────────────────
service Coordinator {
  rpc Put    (PutRequest)    returns (PutResponse);
  rpc Get    (GetRequest)    returns (GetResponse);
  rpc Delete (DeleteRequest) returns (DeleteResponse);
  rpc Txn (TxnRequest) returns (TxnResponse);
  rpc Compact (CompactRequest) returns (CompactResponse);
  rpc Watch (stream WatchRequest) returns (stream WatchResponse);
  rpc LeaseGrant     (LeaseGrantRequest)                           returns (LeaseGrantResponse);
  rpc LeaseRevoke    (LeaseRevokeRequest)                          returns (LeaseRevokeResponse);
  rpc LeaseKeepAlive (stream LeaseKeepAliveRequest)                returns (stream LeaseKeepAliveResponse);
  rpc MemberList (MemberListRequest) returns (MemberListResponse);
}
