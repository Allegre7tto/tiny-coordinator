syntax = "proto3";

package dev.talent.raft.v1;

option java_multiple_files = true;
option java_package = "dev.talent.proto.raft";
option java_outer_classname = "RaftProtocol";

enum EntryKind {
  ENTRY_KIND_UNSPECIFIED = 0;
  COMMAND = 1;
  NOOP = 2;
  JOINT_CONFIG = 3;
  STABLE_CONFIG = 4;
}

message VoterSet {
  repeated uint64 node_ids = 1;
}

message LogEntry {
  uint64 index = 1;
  uint64 term = 2;
  EntryKind kind = 3;
  bytes data = 4;
  VoterSet old_voters = 5;
  VoterSet new_voters = 6;
  repeated uint64 learners = 7;
}

message RequestVoteRequest {
  uint64 term = 1;
  uint64 candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool granted = 2;
}

message AppendEntriesRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  uint64 previous_log_index = 3;
  uint64 previous_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
  uint64 read_context = 7;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 match_index = 3;
  uint64 conflict_term = 4;
  uint64 conflict_index = 5;
  uint64 read_context = 6;
}

message InstallSnapshotRequest {
  uint64 term = 1;
  uint64 leader_id = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term = 4;
  VoterSet old_voters = 5;
  VoterSet new_voters = 6;
  repeated uint64 learners = 7;
  bytes state_machine = 8;
}

message InstallSnapshotResponse {
  uint64 term = 1;
  bool installed = 2;
  uint64 last_included_index = 3;
}

service Raft {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}
