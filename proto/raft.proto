syntax = "proto3";

package engine.raft.v1;

option cc_generic_services = false;

// ─── Log entry stored in Raft log ────────────────────────────────────────────
message LogEntry {
  uint64 term = 1;
  bytes  data = 2;
}

// ─── Persistent state (written to disk, not sent over wire) ──────────────────
message PersistState {
  uint64            term   = 1;
  uint64            voted  = 2;  // 0 = no vote; otherwise (voted_for + 1)
  uint64            base   = 3;  // snapshot boundary index
  uint64            anchor = 4;  // term at index base
  repeated LogEntry log    = 5;
}

// ─── RequestVote ─────────────────────────────────────────────────────────────
message RequestVoteReq {
  uint64 term        = 1;
  uint64 candidate   = 2;
  uint64 last_index  = 3;
  uint64 last_term   = 4;
}

message RequestVoteResp {
  uint64 term = 1;
  bool   vote = 2;
}

// ─── AppendEntries ───────────────────────────────────────────────────────────
message AppendEntriesReq {
  uint64            term          = 1;
  uint64            leader_id     = 2;
  uint64            prev_index    = 3;
  uint64            prev_term     = 4;
  repeated LogEntry entries       = 5;
  uint64            leader_commit = 6;
}

message AppendEntriesResp {
  uint64 term           = 1;
  bool   success        = 2;
  uint64 conflict_term  = 3;
  uint64 conflict_index = 4;
}

// ─── InstallSnapshot ─────────────────────────────────────────────────────────
message InstallSnapshotReq {
  uint64 term       = 1;
  uint64 leader_id  = 2;
  uint64 last_index = 3;
  uint64 last_term  = 4;
  bytes  data       = 5;
}

message InstallSnapshotResp {
  uint64 term = 1;
}

// ─── Service ─────────────────────────────────────────────────────────────────
service Raft {
  rpc RequestVote     (RequestVoteReq)     returns (RequestVoteResp);
  rpc AppendEntries   (AppendEntriesReq)   returns (AppendEntriesResp);
  rpc InstallSnapshot (InstallSnapshotReq) returns (InstallSnapshotResp);
}
